<!DOCTYPE html>

<head>
  <title>ChronOS</title>
</head>

<body>
  <div style="display: flex; gap: 8px;">
    <div>DP:</div>
    <div id="currentDp">0</div>
  </div>

  <div>
    <button id="addDpButton">DP +1</button>
    <button id="minusDpButton">DP -1</button>
  </div>

  <div>
    <input id="dpInput" type="text" placeholder="输入增减表达式，例如 +10-3" />
    <button id="setDpButton">应用表达式</button>
  </div>

  <div>
    <button id="undoButton">撤销（Undo）</button>
  </div>

  <div style="display: flex; gap: 8px;">
    <div>GP:</div>
    <div id="currentGp">0.00</div>
  </div>

  <script src="main.js">
  </script>
</body>

<!DOCTYPE html>

<head>
  <title>ChronOS</title>
</head>

<body>

  <h3>当前数值</h3>
  <table>
    <tr>
      <td>DP</td>
      <td id="currentDp">0</td>
    </tr>
    <tr>
      <td>GP</td>
      <td id="currentGp">0.00</td>
    </tr>
  </table>

  <h3>修改 DP</h3>
  <div>
    <button id="addDpButton">DP +1</button>
    <button id="minusDpButton">DP -1</button>
  </div>

  <div>
    <div>表达式（例：+10-3）</div>
    <input id="dpInput" type="text" />
    <button id="setDpButton">应用表达式</button>
  </div>

  <div>
    <button id="undoButton">撤销（Undo）</button>
  </div>

  <h3>通知功能</h3>
  <div>
    <button id="notifyButton">发送一条系统通知（测试）</button>
  </div>

  <div>历史记录（最新在上）：</div>
  <pre id="historyList">（暂无）</pre>

  <script src="notify.js"></script>
  <script src="main.js"></script>
</body>

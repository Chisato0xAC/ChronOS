<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>ChronOS</title>
  <style>
    body {
      margin: 12px;
      background: #f5f4ee;
      color: #1f2328;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    h3 {
      margin: 0 0 8px 0;
    }

    section {
      margin-bottom: 12px;
    }

    section > article {
      border: 1px solid #d8d4c8;
      background: #fffdf7;
      padding: 10px;
      margin-bottom: 10px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      align-items: start;
    }

    #pageLayout {
      display: block;
    }

    #mainContentSection {
      width: 100%;
    }

    #navBarCard {
      position: fixed;
      z-index: 990;
      border: 1px solid #d8d4c8;
      background: #f3efe4;
      padding: 6px;
    }

    #navBarCard.nav-top {
      top: 8px;
      left: 8px;
      right: 8px;
      height: 40px;
      display: flex;
      align-items: center;
    }

    #navBarCard.nav-bottom {
      bottom: 8px;
      left: 8px;
      right: 8px;
      height: 40px;
      display: flex;
      align-items: center;
    }

    #navBarCard.nav-left {
      top: 8px;
      bottom: 8px;
      left: 8px;
      width: 64px;
    }

    #navBarCard.nav-right {
      top: 8px;
      bottom: 8px;
      right: 8px;
      width: 64px;
    }

    #navBarCard label {
      display: block;
      margin-bottom: 4px;
    }

    #navPositionSelect {
      width: 100%;
    }

    #taskbarSettingsButton,
    #taskbarStatsButton {
      margin-top: 0;
      width: 56px;
      height: 28px;
    }

    #navBarCard.nav-top #taskbarSettingsButton,
    #navBarCard.nav-top #taskbarStatsButton,
    #navBarCard.nav-bottom #taskbarSettingsButton,
    #navBarCard.nav-bottom #taskbarStatsButton {
      width: 64px;
    }

    #taskbarStatsButton {
      margin-left: 6px;
    }

    #navBarCard.nav-left #taskbarStatsButton,
    #navBarCard.nav-right #taskbarStatsButton {
      margin-left: 0;
      margin-top: 6px;
    }

    #settingsPanel {
      position: fixed;
      z-index: 1200;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      border: 1px solid #d8d4c8;
      background: #fffdf7;
      padding: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    #settingsPanel[hidden] {
      display: none;
    }

    #settingsPanel h3 {
      margin: 0 0 8px 0;
    }

    #settingsPanel button {
      margin-top: 8px;
    }

    #statsPanel {
      position: fixed;
      z-index: 1210;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      border: 1px solid #d8d4c8;
      background: #fffdf7;
      padding: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    #statsPanel[hidden] {
      display: none;
    }

    #statsPanel h3 {
      margin: 0 0 8px 0;
    }

    #statsPanel button {
      margin-top: 8px;
    }

    .left-column,
    .right-column {
      min-width: 0;
    }

    .left-column > article,
    .right-column > article {
      border: 1px solid #d8d4c8;
      background: #fffdf7;
      padding: 10px;
      margin-bottom: 10px;
    }

    #serviceStatusCard {
      position: fixed;
      top: 6px;
      right: 8px;
      margin: 0;
      padding: 4px 8px;
      background: #f8f6ed;
      border: 1px solid #e4dfd1;
      border-radius: 6px;
      z-index: 1000;
    }

    #serviceStatusCard h3 {
      display: inline-block;
      font-size: 12px;
      font-weight: normal;
      margin: 0 6px 0 0;
      color: #6b7280;
    }

    #serviceStatusCard p {
      display: inline-block;
      margin: 0;
      font-size: 12px;
    }

    pre {
      margin: 6px 0 0 0;
      padding: 8px;
      background: #fbfaf4;
      border: 1px solid #e8e3d6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #historyList {
      max-height: 300px;
      overflow-y: auto;
    }

    input,
    button,
    textarea {
      margin-top: 4px;
    }

    details {
      margin-top: 8px;
      padding: 6px 8px;
      border: 1px solid #e8e3d6;
      background: #fbfaf4;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    .daily-report-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .daily-report-header h3 {
      margin: 0;
      flex: 1;
      text-align: center;
    }

    .daily-report-switch-button {
      width: 28px;
      height: 28px;
      margin-top: 0;
    }

    #dailyReportCard.stats-focus-flash {
      border-color: #bfa86a;
      box-shadow: 0 0 0 2px rgba(191, 168, 106, 0.25);
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      #navBarCard {
        padding: 4px;
      }

      #navBarCard.nav-top,
      #navBarCard.nav-bottom {
        left: 6px;
        right: 6px;
        height: 36px;
      }

      #navBarCard.nav-left,
      #navBarCard.nav-right {
        top: 6px;
        bottom: 6px;
        width: 58px;
      }
    }

    .dp-plus { color: green }
    .dp-minus { color: red }
  </style>
</head>

<body scroll="no">

  <main id="mainRoot">
    <section>
      <article id="serviceStatusCard" aria-labelledby="serviceStatusTitle">
        <h3 id="serviceStatusTitle">Status</h3>
        <p id="serviceStatus">正在读取服务状态...</p>
      </article>
    </section>

    <div id="pageLayout">
      <article id="navBarCard" class="nav-bottom" aria-label="导航位置">
        <button id="taskbarStatsButton" type="button">统计</button>
        <button id="taskbarSettingsButton" type="button">设置</button>
      </article>

      <section id="settingsPanel" aria-label="设置弹窗" hidden>
        <h3>设置</h3>
        <label for="navPositionSelect">任务栏位置：</label>
        <select id="navPositionSelect">
          <option value="top">上</option>
          <option value="bottom" selected>下</option>
          <option value="left">左</option>
          <option value="right">右</option>
        </select>
        <div>
          <button id="closeSettingsPanelButton" type="button">关闭</button>
        </div>
      </section>

      <section id="statsPanel" aria-label="统计弹窗" hidden>
        <h3>统计</h3>
        <pre id="statsPanelContent">（正在读取）</pre>
        <div>
          <button id="closeStatsPanelButton" type="button">关闭</button>
        </div>
      </section>

      <section id="mainContentSection" class="main-grid">
      <div class="left-column">
        <article aria-labelledby="dpActionTitle">
          <h3 id="dpActionTitle">修改 DP</h3>

          <div>
            <button id="addDpButton" type="button">DP +1</button>
            <button id="minusDpButton" type="button">DP -1</button>
          </div>

          <div>
            <label for="dpInput">表达式（例：+10-3）</label>
            <input id="dpInput" type="text" />
            <button id="setDpButton" type="button">应用表达式</button>
          </div>

          <div>
            <button id="undoButton" type="button">撤销（Undo）</button>
          </div>
        </article>

        <article aria-labelledby="historyTitle">
          <h3 id="historyTitle">历史记录</h3>
          <pre id="historyList">（暂无）</pre>
        </article>
      </div>

      <div class="right-column">
        <article aria-labelledby="currentValueTitle">
          <h3 id="currentValueTitle">当前数值</h3>
          <table>
            <tr>
              <th scope="row">DP</th>
              <td><span id="currentDp">0</span> <span id="currentCycleDpDelta">(0)</span></td>
            </tr>
            <tr>
              <th scope="row">GP</th>
              <td id="currentGp">0.00</td>
            </tr>
          </table>
        </article>

        <article id="dailyReportCard" aria-labelledby="dailyReportSimpleTitle">
          <div class="daily-report-header">
            <button id="dailyReportPrevDayButton" class="daily-report-switch-button" type="button" aria-label="查看前一天">&lt;</button>
            <h3 id="dailyReportSimpleTitle">每日日报（简略）</h3>
            <button id="dailyReportNextDayButton" class="daily-report-switch-button" type="button" aria-label="查看后一天">&gt;</button>
          </div>
          <pre id="dailyReportSimple">（正在读取）</pre>
        </article>

        <article aria-labelledby="notifyTitle">
          <h3 id="notifyTitle">功能列表</h3>

          <details>
            <summary>通知</summary>
            <div>
              <label for="notifyDelayHoursInput">延迟时间（时:分:秒）：</label>
              <input id="notifyDelayHoursInput" type="number" min="0" max="99" value="0" />
              <span>:</span>
              <input id="notifyDelayMinutesInput" type="number" min="0" max="59" value="0" />
              <span>:</span>
              <input id="notifyDelaySecondsInput" type="number" min="0" max="59" value="5" />
            </div>
            <p id="notifySchedulePreview">将在 --:--:-- 通知</p>
            <button id="notifyButton" type="button">发布通知任务</button>
            <p>待触发通知任务：</p>
            <pre id="notifyTaskList">（暂无）</pre>
          </details>

          <details>
            <summary>便签</summary>
            <fieldset>
              <legend>便签（自动保存）</legend>
              <label for="noteInput">在这里写笔记：</label>
              <br />
              <textarea id="noteInput" rows="14" cols="32"></textarea>
              <p id="noteSaveStatus">（尚未保存）</p>
            </fieldset>
          </details>

          <details>
            <summary>悬浮窗</summary>
            <button id="openFloatingWindowButton" type="button">打开悬浮窗</button>
          </details>
        </article>
      </div>
      </section>
    </div>
  </main>

  <script src="notify.js"></script>
  <script src="main.js"></script>
</body>

</html>
